<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manhattan Noisescape</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      canvas { width: 100%; height: 100%; display: block; }
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a1a2e; color: #eee; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        font-family: system-ui, sans-serif; z-index: 10;
      }
      #loading h1 { font-size: 1.5rem; margin-bottom: 1rem; }
      #loading p { font-size: 0.9rem; color: #aaa; }
      #loading.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>Manhattan Noisescape</h1>
      <p id="status">Initializing...</p>
    </div>
    <canvas id="map-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
