<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manhattan Street Network</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: system-ui, sans-serif; }
    #map { width: 100%; height: 100%; }

    #loading-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(255,255,255,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.3s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-status { font-size: 16px; color: #333; margin-top: 12px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #controls-panel {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background: white; border-radius: 8px; padding: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 13px;
      max-width: 220px;
    }
    #controls-panel h3 { margin-bottom: 8px; font-size: 14px; }
    .layer-toggle { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .layer-toggle input { cursor: pointer; }
    .layer-toggle label { cursor: pointer; }

    #legend {
      position: absolute; bottom: 30px; left: 10px; z-index: 10;
      background: white; border-radius: 8px; padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 12px;
    }
    #legend h4 { margin-bottom: 6px; font-size: 13px; }
    .legend-bar {
      width: 180px; height: 14px; border-radius: 3px;
      background: linear-gradient(to right, #2166ac, #67a9cf, #f7f7f7, #ef8a62, #b2182b);
    }
    .legend-labels { display: flex; justify-content: space-between; margin-top: 2px; }

    #info-panel {
      position: absolute; bottom: 30px; right: 10px; z-index: 10;
      background: white; border-radius: 8px; padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 12px;
      max-width: 280px; max-height: 300px; overflow-y: auto;
      display: none;
    }
    #info-panel h4 { margin-bottom: 6px; font-size: 13px; }
    #info-panel table { width: 100%; border-collapse: collapse; }
    #info-panel td { padding: 2px 4px; border-bottom: 1px solid #eee; }
    #info-panel td:first-child { font-weight: 600; color: #555; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-status">Initializing...</div>
  </div>
  <div id="map"></div>
  <div id="controls-panel">
    <h3>Layers</h3>
    <div class="layer-toggle">
      <input type="checkbox" id="toggle-surface" checked />
      <label for="toggle-surface">Surface</label>
    </div>
    <div class="layer-toggle">
      <input type="checkbox" id="toggle-parks" checked />
      <label for="toggle-parks">Parks</label>
    </div>
    <div class="layer-toggle">
      <input type="checkbox" id="toggle-water" checked />
      <label for="toggle-water">Water</label>
    </div>
    <div class="layer-toggle">
      <input type="checkbox" id="toggle-roads" checked />
      <label for="toggle-roads">Roads</label>
    </div>
  </div>
  <div id="legend">
    <h4>Road Length (m)</h4>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>0</span>
      <span id="legend-max">2000</span>
    </div>
  </div>
  <div id="info-panel">
    <h4>Selected Feature</h4>
    <table id="info-table"><tbody></tbody></table>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
