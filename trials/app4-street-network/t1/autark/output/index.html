<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manhattan Street Network — Road Segment Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { width: 100%; height: 100%; display: block; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #e0e0e0; font-family: system-ui, sans-serif; font-size: 1.2rem;
      text-align: center; z-index: 10;
    }
    #loading .phase { margin-top: 0.5rem; font-size: 0.9rem; color: #aaa; }
  </style>
</head>
<body>
  <div id="loading">
    <div>Loading Manhattan Street Network...</div>
    <div class="phase" id="phase">Initializing...</div>
  </div>
  <canvas id="map-canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
