<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manhattan Buildings — Subway Accessibility 3D Map</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      canvas { width: 100%; height: 100%; display: block; }
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; z-index: 10;
      }
      #loading h1 { font-size: 1.4rem; margin-bottom: 1rem; }
      #loading-status { font-size: 0.9rem; color: #aaa; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>Manhattan Subway Accessibility 3D Map</h1>
      <div id="loading-status">Initializing...</div>
    </div>
    <canvas id="map-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
