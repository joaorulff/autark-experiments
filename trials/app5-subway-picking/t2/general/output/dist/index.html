<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manhattan Subway Accessibility 3D Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #app { width: 100%; height: 100%; }
    canvas { display: block; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a1a2e; color: #eee; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 1000;
      font-size: 1.2rem;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 4px solid #333;
      border-top-color: #00d2ff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { margin: 0.3rem 0; }
    #legend {
      position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8);
      color: #eee; padding: 12px 16px; border-radius: 8px; font-size: 13px;
      z-index: 100; pointer-events: none;
    }
    #legend h3 { margin-bottom: 6px; font-size: 14px; }
    #legend .bar {
      width: 200px; height: 16px; border-radius: 3px;
      background: linear-gradient(to right, #2c1654, #6a1b9a, #d32f2f, #ff9800, #ffeb3b);
    }
    #legend .labels { display: flex; justify-content: space-between; font-size: 11px; margin-top: 2px; }
    #info {
      position: fixed; top: 12px; left: 12px; background: rgba(0,0,0,0.8);
      color: #eee; padding: 10px 14px; border-radius: 8px; font-size: 13px;
      z-index: 100; pointer-events: none; display: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-dYAiPgmQ.js"></script>
</head>
<body>
  <div id="app"></div>
  <div id="loading">
    <div class="spinner"></div>
    <p id="load-status">Initializing...</p>
  </div>
  <div id="legend">
    <h3>Subway Stations within 500m</h3>
    <div class="bar"></div>
    <div class="labels"><span>0</span><span>5+</span></div>
  </div>
  <div id="info"></div>
</body>
</html>
