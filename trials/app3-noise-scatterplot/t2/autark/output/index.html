<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manhattan Noisescape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #1a1a2e; color: #eee; }
    #app { display: flex; width: 100%; height: 100%; }
    #map-container { flex: 1; position: relative; }
    #map-container canvas { width: 100%; height: 100%; display: block; }
    #sidebar { width: 420px; display: flex; flex-direction: column; background: #16213e; border-left: 1px solid #0f3460; }
    #chart-container { width: 100%; height: 400px; padding: 10px; }
    #status { padding: 10px; font-size: 13px; color: #a0a0c0; overflow-y: auto; flex: 1; }
    #status p { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-container">
      <canvas id="map-canvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="chart-container"></div>
      <div id="status"><p>Initializing...</p></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
