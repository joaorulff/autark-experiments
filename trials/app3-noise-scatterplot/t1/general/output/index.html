<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manhattan Noisescape</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; background: #1a1a2e; }
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #map-container {
      flex: 1;
      position: relative;
    }
    #sidebar {
      width: 420px;
      background: #16213e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #0f3460;
    }
    #sidebar h2 {
      padding: 16px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e94560;
      border-bottom: 1px solid #0f3460;
    }
    #scatterplot-container {
      flex: 1;
      padding: 12px;
      min-height: 300px;
    }
    #info-panel {
      padding: 16px;
      border-top: 1px solid #0f3460;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    #info-panel h3 { color: #e94560; margin-bottom: 8px; font-size: 13px; }
    #info-panel p { margin: 2px 0; color: #a0a0b0; }
    #legend {
      padding: 12px 16px;
      border-top: 1px solid #0f3460;
      font-size: 11px;
    }
    #legend h3 { color: #e94560; margin-bottom: 6px; font-size: 12px; }
    .legend-bar {
      height: 14px;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      color: #a0a0b0;
    }
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(26,26,46,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      color: #e94560;
      font-size: 18px;
    }
    #loading-overlay .spinner {
      width: 48px; height: 48px;
      border: 4px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    #loading-status { color: #a0a0b0; font-size: 13px; margin-top: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(22,33,62,0.95);
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid #0f3460;
      z-index: 1000;
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div>Loading Manhattan Noisescape...</div>
    <div id="loading-status">Initializing...</div>
  </div>
  <div id="app">
    <div id="map-container"></div>
    <div id="sidebar">
      <h2>Noise vs Building Area</h2>
      <div id="scatterplot-container"></div>
      <div id="legend">
        <h3>Noise Complaints (500m radius)</h3>
        <div class="legend-bar" id="legend-bar"></div>
        <div class="legend-labels">
          <span>0</span>
          <span id="legend-max">100+</span>
        </div>
      </div>
      <div id="info-panel">
        <h3>Selection Info</h3>
        <p>Click on a building or map element to see details.</p>
      </div>
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
