apiVersion: batch/v1
kind: Job
metadata:
  name: trial-TRIAL_ID
  labels:
    app: autark-trial
    trial: TRIAL_ID
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      initContainers:
        # Wait for Ollama to be ready and model to be pulled
        - name: wait-for-model
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until curl -s http://ollama:11434/api/tags > /dev/null 2>&1; do
                sleep 5
              done
              echo "Pulling model qwen2.5-coder:32b (this may take a while on first run)..."
              curl -s http://ollama:11434/api/pull -d '{"name": "qwen2.5-coder:32b"}' | tail -1
              echo "Model ready."
      containers:
        - name: aider
          image: python:3.12-bookworm
          command:
            - bash
            - -c
            - |
              # Install aider and Node.js
              pip install aider-chat > /dev/null 2>&1
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash - > /dev/null 2>&1
              apt-get install -y nodejs > /dev/null 2>&1

              # Create output directory for this trial
              mkdir -p /output/TRIAL_ID
              cd /output/TRIAL_ID

              # Initialize a git repo (aider requires one)
              git init
              git config user.email "trial@autark.dev"
              git config user.name "Autark Trial"

              # Run aider with the prompt from the configmap
              # Ollama exposes an OpenAI-compatible API at /v1
              export OLLAMA_API_BASE=http://ollama:11434
              aider --no-auto-commits \
                --model ollama/qwen2.5-coder:32b \
                --yes-always \
                --no-git \
                --message-file /prompt/prompt.md \
                2>&1 | tee /output/TRIAL_ID/log.txt

              echo "==> Trial TRIAL_ID complete."
          resources:
            requests:
              cpu: 2
              memory: 4Gi
            limits:
              cpu: 4
              memory: 8Gi
          volumeMounts:
            - name: prompt
              mountPath: /prompt
            - name: output
              mountPath: /output
      volumes:
        - name: prompt
          configMap:
            name: trial-prompt-TRIAL_ID
        - name: output
          persistentVolumeClaim:
            claimName: trial-outputs
